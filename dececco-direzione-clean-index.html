const state={started:false,mission:0,view:"mission",done:[],unlocked:[],kpi:{...INITIAL_KPI},missionState:{},selectedRecipe:{pasta:null,sauce:null,territory:null},missionPanel:false,historyIndex:0};
const app=document.getElementById("app");
const toast=document.getElementById("toast");
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function icon(name){const icons={history:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V7l8-4 8 4v12"/><path d="M8 11h8M8 15h8M10 19v-4h4v4"/></svg>',mission:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12h16M12 4v16"/><circle cx="12" cy="12" r="7"/></svg>',atlas:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6l5-2 8 2 5-2v14l-5 2-8-2-5 2z"/><path d="M8 4v14M16 6v14"/></svg>',method:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M7 4v6M17 4v6M5 14h14M8 11v6M16 11v6"/></svg>',archive:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16v4H4zM6 9h12v11H6z"/><path d="M9 13h6"/></svg>',recipes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3v8M3 3v5c0 2 1 3 3 3s3-1 3-3V3M6 11v10M16 3c3 3 3 8 0 11v7"/></svg>'};return icons[name]||''}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function resetMissionState(){state.missionState={}}
function kpiHtml(){return Object.entries({heritage:'Eredità',quality:'Qualità',innovation:'Innovazione',resilience:'Resilienza',reach:'Mondo'}).map(([k,l])=>`<div class="kpi-row"><span>${l}</span><div class="kpi-track"><i style="width:${state.kpi[k]}%"></i></div><b>${state.kpi[k]}</b></div>`).join('')}
function renderIntro(){app.innerHTML=`<section class="hero"><div class="hero-bg"></div><div class="hero-content"><div><div class="kicker">Esperienza interattiva · storia, territorio e qualità</div><h1>Dal Mulino<span>al Mondo</span></h1><p class="hero-copy">Un viaggio interattivo dentro una grande storia italiana. <b>Dal mulino di Fara San Martino alla tavola del mondo</b>: territorio, persone, innovazione, rinascita e qualità senza compromessi.</p><div class="hero-meta"><span class="pill">Storia celebrativa</span><span class="pill">12 missioni</span><span class="pill">Mappe interattive</span><span class="pill">Metodo produttivo</span><span class="pill">Ricette e territori</span></div></div><div class="hero-card"><div class="kicker" style="color:var(--red)">1831 → Oggi</div><h2>Una storia che continua</h2><p>Scopri prima il percorso celebrativo indipendente, poi entra nel gioco per trasformare i grandi snodi De Cecco in azioni, sistemi e conseguenze.</p><div class="era-row">${ERA.map(e=>`<div class="era-chip"><b>${e.name}</b><span>${e.years}</span></div>`).join('')}</div><div class="intro-actions"><button class="start-btn" data-action="open-history">Scopri la storia De Cecco</button><button class="start-btn history-entry" data-action="start">Inizia il gioco</button></div><div class="small-note">Esperienza dimostrativa · immagini di repertorio con crediti inclusi</div></div></div></section>`}
function renderShell(){const m=MISSIONS[state.mission];const historyMode=state.view==='history';app.innerHTML=`<section class="shell"><header class="topbar"><div class="brand"><div class="brandmark">DC</div><div><b>Dal Mulino al Mondo</b><small>${historyMode?'La grande storia De Cecco':'Gioco del patrimonio De Cecco'}</small></div></div><div class="chapterbar">${ERA.map((e,i)=>`<div class="chapterdot ${historyMode?'done':i<m.era?'done':i===m.era?'active':''}"><i></i></div>`).join('')}</div><div class="top-actions"><button class="top-btn" data-action="credits">Crediti</button><button class="top-btn" data-view="${historyMode?'mission':'history'}">${historyMode?'Vai al gioco':'Storia'}</button><button class="top-btn" data-action="toggle-panel">Pannello</button></div></header><div class="gamegrid"><nav class="navrail">${[['history','Storia'],['mission','Missione'],['atlas','Atlante'],['method','Metodo'],['archive','Archivio'],['recipes','Ricette']].map(([v,l])=>`<button class="navbtn ${state.view===v?'active':''}" data-view="${v}">${icon(v)}<span>${l}</span></button>`).join('')}</nav><main class="stage"><div class="stage-inner"><div class="stage-card">${renderView()}</div></div></main><aside class="missionbar ${state.missionPanel?'open':''}">${historyMode?renderHistoryBar():renderMissionBar()}</aside></div></section>`;bindDynamic();}

 {year:"1831",title:"Il mulino di Fara San Martino",short:"Le origini",image:"fara.jpg",text:"Nicola Antonio De Cecco avvia l’attività di mugnaio a Fara San Martino. Nel rapporto tra la Maiella, l’acqua e il lavoro prende forma una storia d’impresa destinata a durare."},
 {year:"1886",title:"Nasce il Pastificio De Cecco",short:"La pasta",image:"factory.jpg",text:"Filippo Giovanni De Cecco amplia l’attività di famiglia e fonda il pastificio. L’antica sapienza molitoria incontra una nuova ambizione industriale."},
 {year:"1889",title:"L’innovazione che cambia la pasta",short:"L’essiccazione",image:"machine.jpg",text:"Filippo Giovanni mette a punto il primo impianto di essiccazione artificiale ad aria calda: la produzione diventa più controllabile e meno dipendente dal clima."},

 {year:"1952",title:"Un simbolo riconosciuto nel mondo",short:"La contadina",image:"wheat.jpg",text:"Viene registrato il marchio con la giovane contadina in costume tradizionale abruzzese: territorio, grano e identità si condensano in un’immagine memorabile."},
 {year:"1974",title:"Crescere senza fermare la qualità",short:"L’ampliamento",image:"factory.jpg",text:"Lo stabilimento di Fara San Martino viene ampliato e la produzione trasferita senza perdere un solo giorno di attività: un passaggio decisivo di capacità e organizzazione."},
 {year:"1986",title:"Tradizione e impresa moderna",short:"Nuove sfide",image:"pasta.jpg",text:"Nascono la pasta integrale, la rete di vendita diretta e la Società Olearia. L’identità De Cecco si amplia senza abbandonare il metodo."},
 {year:"2016",title:"Centotrent’anni di storia italiana",short:"130 anni",image:"fara.jpg",text:"Per il 130° anniversario viene emesso un francobollo dedicato: De Cecco è il primo pastificio italiano a ricevere questo omaggio alla propria storia."},
 {year:"2021",title:"Marchio storico di interesse nazionale",short:"Il riconoscimento",image:"wheat.jpg",text:"De Cecco diventa il primo produttore di pasta secca a potersi fregiare del titolo di Marchio storico di interesse nazionale."},
 {year:"Oggi",title:"Dal mulino al mondo",short:"La storia continua",image:"pasta.jpg",text:"La memoria del mulino vive nel metodo contemporaneo: semola fresca, acqua fredda di montagna, trafile ruvide e lenta essiccazione a bassa temperatura."}
];
function renderHistoryBar(){const e=HISTORY_EVENTS[state.historyIndex]||HISTORY_EVENTS[0];return `<div class="step-tag">Percorso celebrativo</div><h3>La grande storia De Cecco</h3><p>Una sezione autonoma, sempre accessibile, dedicata alle persone, alle innovazioni e ai passaggi che hanno costruito un patrimonio italiano.</p><div class="history-side"><small>Capitolo selezionato</small><b>${esc(e.year)} · ${esc(e.short)}</b><p>${esc(e.title)}</p></div><div class="mission-stats"><div class="stat"><small>Origine</small><b>1831</b></div><div class="stat"><small>Pastificio</small><b class="yellow">1886</b></div><div class="stat"><small>Innovazione</small><b>1889</b></div><div class="stat"><small>Marchio storico</small><b>2021</b></div></div><button class="next-btn" data-view="mission">Entra nelle missioni</button>`}
function renderHistory(){const e=HISTORY_EVENTS[state.historyIndex]||HISTORY_EVENTS[0];return `<div class="history-page"><section class="history-hero" style="background-image:url('${e.image}')"><div class="history-hero-copy"><div class="history-overline">La grande storia De Cecco</div><h2>${esc(e.title)}</h2><p>${esc(e.text)}</p></div><div class="history-year-seal"><div><strong>${esc(e.year)}</strong><span>Dal territorio<br>alla tavola del mondo</span></div></div></section><div class="history-timeline-wrap"><div class="history-timeline-label"><h3>Una storia da esplorare</h3><p>Seleziona un anno e attraversa i momenti che hanno costruito l’eredità De Cecco.</p></div><div class="history-timeline">${HISTORY_EVENTS.map((x,i)=>`<button class="history-stop ${i===state.historyIndex?'active':''}" data-story="${i}"><b>${esc(x.year)}</b><span>${esc(x.short)}</span></button>`).join('')}</div></div><div class="history-body"><div class="history-intro-grid"><div class="history-manifesto"><small>Un patrimonio italiano</small><h3>Quasi due secoli da mugnai.<br>Una qualità che non si improvvisa.</h3><p>La storia De Cecco unisce radicamento territoriale e vocazione internazionale. È la storia di una famiglia, di una comunità e di un metodo capace di trasformare i vincoli in innovazione, la distruzione in rinascita e una tradizione locale in cultura alimentare italiana nel mondo.</p></div><div class="history-recognition"><div class="seal">DC</div><h3>Una storia riconosciuta</h3><p>Nel 2021 De Cecco è diventata il primo produttore di pasta secca a ottenere il titolo di Marchio storico di interesse nazionale. Un riconoscimento alla continuità, alla reputazione e alla qualità costruite nel tempo.</p></div></div><div class="history-chapters"><article class="history-chapter" style="background-image:url('fara.jpg')"><div class="history-chapter-copy"><small>1831–1886</small><h4>Le radici</h4><p>Il mulino, la Maiella, l’acqua e la nascita del pastificio.</p></div></article><article class="history-chapter" style="background-image:url('machine.jpg')"><div class="history-chapter-copy"><small>1889–1935</small><h4>L’ingegno</h4><p>L’essiccazione artificiale ad aria calda e il riconoscimento Treccani.</p></div></article><article class="history-chapter" style="background-image:url('factory.jpg')"><div class="history-chapter-copy"><small>1943–1952</small><h4>La rinascita</h4><p>Dalla distruzione alla ricostruzione, fino al simbolo della contadina.</p></div></article><article class="history-chapter" style="background-image:url('pasta.jpg')"><div class="history-chapter-copy"><small>Oggi</small><h4>Il mondo</h4><p>Una tradizione produttiva che porta la cultura italiana oltre i confini.</p></div></article></div><div class="history-proof"><div class="history-proof-card"><b>1831</b><strong>La tradizione molitoria</strong><span>Don Nicola avvia il mulino di Fara San Martino.</span></div><div class="history-proof-card"><b>1889</b><strong>Innovazione epocale</strong><span>Il primo impianto di essiccazione artificiale ad aria calda.</span></div><div class="history-proof-card"><b>1944</b><strong>La forza della ricostruzione</strong><span>Una piccola macchina nata da pezzi di recupero riavvia la produzione.</span></div><div class="history-proof-card"><b>100+</b><strong>Paesi nel mondo</strong><span>Una storia abruzzese diventata ambasciatrice della cultura alimentare italiana.</span></div></div><div class="history-cta"><div><h3>La storia diventa esperienza</h3><p>Ora entra nelle missioni e trasforma i grandi passaggi De Cecco in decisioni, processi, mappe e ricostruzioni interattive.</p></div><button data-view="mission">Inizia il gioco</button></div></div></div>`}

function renderMissionBar(){const m=MISSIONS[state.mission],completed=state.done.includes(state.mission);return `<div class="step-tag">Missione ${state.mission+1} / ${MISSIONS.length}</div><h3>${esc(m.title)}</h3><p>${esc(m.objective)}</p><div class="mission-stats"><div class="stat"><small>Epoca</small><b>${esc(ERA[m.era].name)}</b></div><div class="stat"><small>Anno</small><b class="yellow">${esc(m.year)}</b></div><div class="stat"><small>Archivi</small><b>${state.unlocked.length}/12</b></div><div class="stat"><small>Avanzamento</small><b>${Math.round(state.done.length/MISSIONS.length*100)}%</b></div></div><div class="kpi-list">${kpiHtml()}</div><button class="next-btn" data-action="next" ${completed?'':'disabled'}>${state.mission===MISSIONS.length-1?'Vedi il report finale':'Passa alla missione successiva'}</button><button class="ghost-btn" data-action="reset-mission">Ricomincia questa missione</button>`}
function renderView(){if(state.view==='history')return renderHistory();if(state.view==='mission')return renderMission();if(state.view==='atlas')return renderAtlas();if(state.view==='method')return renderMethod();if(state.view==='archive')return renderArchive();return renderRecipes();}
function hero(m){return `<div class="mission-hero" style="background-image:url('${m.image}')"><div class="mission-hero-copy"><small>${ERA[m.era].name} · ${m.year}</small><h2>${esc(m.title)}</h2><p>${esc(m.desc)}</p></div></div>`}
function renderMission(){const m=MISSIONS[state.mission];return hero(m)+`<div class="workspace">${renderMissionType(m)}</div>`}
function renderMissionType(m){const s=state.missionState;switch(m.type){
case'explore':{const nodes=[['Maiella','Il contesto montano definisce clima, paesaggio e risorse.'],['Acqua','Le sorgenti collegano territorio, impasto e identità produttiva.'],['Borgo','Fara San Martino è il luogo in cui comunità e impresa crescono insieme.'],['Mulino','Qui la materia prima incontra il sapere del mugnaio.']];const explored=nodes.filter((_,i)=>s['n'+i]).length;const ready=explored===nodes.length;return `<div class="workspace-grid"><div class="origin-board"><div class="origin-system"><div class="origin-system-head"><small>Paesaggio produttivo</small><h4>Quattro elementi, un solo sistema</h4><p>Questa è la missione: seleziona ciascuna tessera per scoprire il suo ruolo nella nascita dell’impresa. Puoi seguirle nell’ordine che preferisci.</p><div style="margin-top:12px;font-weight:700;color:var(--blue-dark)">Elementi esplorati: ${explored}/4</div></div><div class="origin-flow">${nodes.map((n,i)=>`<button class="origin-node ${s['n'+i]?'done':''}" data-action="explore" data-i="${i}"><span class="origin-number">${s['n'+i]?'✓':i+1}</span><b>${n[0]}</b><span>${n[1]}</span></button>`).join('')}</div><div class="origin-caption"><b>Un ecosistema produttivo nasce dalle relazioni.</b> Territorio, risorse, comunità e sapere molitorio costruiscono insieme l’identità delle origini.</div>${ready?`<button class="secondary-button" style="margin-top:16px" data-action="complete-origin">Concludi la missione</button>`:''}</div></div><div class="panel"><div class="panel-label">Sistema territoriale</div><h3>Geografia delle origini</h3><p>Non devi trovare luoghi nella fotografia e non devi sbloccare altri ambienti. Devi soltanto aprire le quattro tessere per leggere come montagna, acqua, borgo e mulino formano un unico sistema.</p><div class="discovery-log">${nodes.map((n,i)=>s['n'+i]?`<div class="discovery"><b>${n[0]}</b><br>${n[1]}</div>`:'').join('')}</div></div></div>`}
case'mill':{let purity=s.purity??72,humidity=s.humidity??48,grind=s.grind??55;let score=Math.round(100-Math.abs(purity-84)*1.2-Math.abs(humidity-42)*1.1-Math.abs(grind-61)*.9);return `<div class="workspace-grid"><div class="panel"><div class="panel-label">Controllo del mulino</div><h3>Configura la macinazione</h3><div class="slider-box">${slider('purezza','Purezza del grano',purity,50,100,'%')}${slider('umidita','Umidità',humidity,20,70,'%')}${slider('granulometria','Granulometria',grind,20,90,'')}</div><div class="process-meter"><i style="left:${Math.max(0,Math.min(100,score))}%"></i></div><div class="result-card ${score<78?'bad':''}">Indice di qualità del lotto: <b>${score}</b>. ${score>=78?'Profilo stabile: puoi validare il lotto.':'Ribilancia i parametri per evitare perdita di resa o qualità.'}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-mill">Valida il lotto</button></div><div class="panel"><div class="panel-label">Obiettivo</div><h3>La miglior farina del contado</h3><p>Il punteggio non premia il massimo assoluto di ogni parametro, ma il loro equilibrio. La qualità nasce dalla relazione tra materia prima, umidità e lavoro del mugnaio.</p></div></div>`}
case'allocation':{const a=s.alloc||{mill:34,lab:33,people:33};return `<div class="panel"><div class="panel-label">Allocazione delle risorse</div><h3>Costruisci un'impresa equilibrata</h3><p>Distribuisci 100 unità. Nessuna leva può essere trascurata.</p><div class="alloc-grid">${allocCard('mill','Mulino',a.mill)}${allocCard('lab','Pastificio',a.lab)}${allocCard('people','Persone',a.people)}</div><div class="budget-line"><span>Capitale allocato</span><b>${a.mill+a.lab+a.people}/100</b></div><button class="secondary-button" style="margin-top:14px" data-action="validate-allocation">Costituisci il pastificio</button></div>`}
case'drying':case'method':{let temp=s.temp??(m.type==='drying'?52:48),time=s.time??(m.type==='drying'?70:82),air=s.air??55;let quality=Math.round(100-Math.abs(temp-48)*1.2-Math.abs(time-82)*.45-Math.abs(air-56)*.55);let consumption=Math.round(temp*.55+air*.38+(100-time)*.12);return `<div class="workspace-grid"><div class="panel"><div class="panel-label">Laboratorio termico</div><h3>${m.type==='drying'?'Prototipo di essiccazione':'Curva del metodo lento'}</h3><div class="slider-box">${slider('temp','Temperatura',temp,30,90,'°C')}${slider('time','Tempo',time,30,100,'h')}${slider('air','Flusso d’aria',air,20,90,'%')}</div><div class="result-card ${quality<82?'bad':''}">Qualità stimata <b>${quality}</b> · Indice di consumo <b>${consumption}</b>. ${quality>=82&&temp<=60?'Curva coerente con una logica lenta e controllata.':'La curva sta comprimendo troppo il processo.'}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-drying">Valida la curva</button></div><div class="panel"><div class="panel-label">Equilibrio di processo</div><h3>Il tempo come ingrediente</h3><p>Accelerare riduce il tempo di linea, ma aumenta il rischio di compromettere struttura e identità. Il gioco premia una soluzione industrialmente leggibile, non la lentezza fine a sé stessa.</p></div></div>`}
case'choice':{const opts=[['Essiccazione al sole','Dipendenza elevata dal clima, investimento minimo.',['+Tradizione','−Continuità']],['Aria calda controllata','Controllo del processo, qualità replicabile e indipendenza dal meteo.',['+Qualità','+Affidabilità']],['Produzione stagionale','Riduce il rischio, ma limita crescita e disponibilità.',['+Prudenza','−Scala']]];return `<div class="panel"><div class="panel-label">Sala scenari</div><h3>Strategia climatica</h3><div class="choice-grid">${opts.map((o,i)=>`<button class="choice-card ${s.choice===i?'selected':''}" data-action="choice" data-i="${i}"><h4>${o[0]}</h4><p>${o[1]}</p><div class="impact">${o[2].map(x=>`<span>${x}</span>`).join('')}</div></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-choice">Conferma la strategia</button></div>`}
case'brand':{const items=[['Donna abruzzese','Lavoro e territorio'],['Covoni di grano','Materia prima'],['Costume tradizionale','Identità abruzzese'],['Motoscafo','Velocità'],['Grattacielo','Modernità astratta'],['Corona reale','Prestigio']];return `<div class="panel"><div class="panel-label">Studio dell’identità</div><h3>Componi il simbolo del 1952</h3><p>Scegli tre elementi. Il sistema deve raccontare origine, materia e riconoscibilità.</p><div class="choice-grid">${items.map((o,i)=>`<button class="choice-card ${s['b'+i]?'selected':''}" data-action="brand" data-i="${i}"><h4>${o[0]}</h4><p>${o[1]}</p></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-brand">Registra il marchio</button></div>`}
case'salvage':{const zones=[['Archivio ricette','heritage'],['Motore ausiliario','resilience'],['Trafila','quality'],['Quaderni tecnici','innovation'],['Scorte compromesse','risk'],['Linea danneggiata','risk']];return `<div class="panel"><div class="panel-label">Mappa del recupero</div><h3>Recupera ciò che può far ripartire l’impresa</h3><p>Scenario didattico: le risorse proposte rappresentano una simulazione narrativa, non la ricostruzione documentaria dei singoli beni recuperati.</p><div class="choice-grid">${zones.map((z,i)=>`<button class="choice-card ${s['z'+i]?'selected':''}" data-action="salvage" data-i="${i}"><h4>${z[0]}</h4><p>${z[1]==='risk'?'Area ad alto costo di recupero':'Risorsa riutilizzabile'}</p></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-salvage">Chiudi il piano di recupero</button></div>`}
case'assembly':{const parts=['Miscelatore','Gramola','Pressa','Essiccatoio'];const order=s.order||[];return `<div class="assembly"><div class="panel"><div class="panel-label">Componenti</div><h3>Pezzi disponibili</h3><div class="parts">${parts.map((p,i)=>`<button class="part ${order.includes(i)?'used':''}" data-action="part" data-i="${i}"><span class="part-icon">${i+1}</span><b>${p}</b></button>`).join('')}</div></div><div class="panel"><div class="panel-label">Linea minima</div><h3>Sequenza operativa</h3><div class="slots">${[0,1,2,3].map((_,i)=>`<div class="slot ${order[i]!=null?'filled':''}"><span class="slot-num">${i+1}</span><b>${order[i]!=null?parts[order[i]]:'Seleziona un modulo'}</b></div>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-assembly">Avvia la linea</button></div></div>`}
case'portfolio':{const items=[['Pasta','Cuore del metodo',34],['Oli e aceti','Cultura mediterranea',24],['Pomodori, sughi e salse','Servizio e gusto',26],['Prodotti da forno','Nuove occasioni',23],['Bevande energetiche','Fuori identità',-20],['Snack dolci','Coerenza debole',-8]];return `<div class="panel"><div class="panel-label">Strategia di portafoglio</div><h3>Espandi senza diluire</h3><div class="choice-grid">${items.map((o,i)=>`<button class="choice-card ${s['p'+i]?'selected':''}" data-action="portfolio" data-i="${i}"><h4>${o[0]}</h4><p>${o[1]}</p><div class="impact"><span>Coerenza ${o[2]>0?'+':''}${o[2]}</span></div></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-portfolio">Approva il portafoglio</button></div>`}
case'world':{const markets=[['Europa',24,38,120,210],['Americhe',38,25,470,175],['Giappone',38,28,770,200]];const opened=s.markets||[];return `<div class="workspace-grid"><div class="worldmap"><svg viewBox="0 0 900 420" aria-label="Mappa dei mercati"><path class="land" d="M95 140l95-48 95 30 30 60-76 52-88-17zM365 100l94-34 94 48-20 84-83 14-55-39zM580 104l173-44 95 76-43 97-132 23-87-71zM367 265l104-36 44 62-39 92-83-11z"/><circle cx="405" cy="177" r="9" fill="#c8102e"/><text x="418" y="180" fill="#17384d" font-size="12" font-weight="900">Fara San Martino</text>${markets.map((m,i)=>`<g class="market ${opened.includes(i)?'unlocked':''}" data-action="market" data-i="${i}"><circle cx="${m[3]}" cy="${m[4]}" r="12"/><text x="${m[3]+18}" y="${m[4]+4}">${m[0]} · ${m[1]}</text></g>${opened.includes(i)?`<path class="route-line" d="M405 177 Q${(405+m[3])/2} ${110+i*45} ${m[3]} ${m[4]}"/>`:''}`).join('')}</svg></div><div class="panel"><div class="panel-label">Rotte internazionali</div><h3>Budget delle rotte</h3><p>Apri i tre mercati. Costi e punteggi sono simulati e servono a rappresentare il presidio richiesto da ciascuna rotta.</p><div class="budget-line"><span>Budget residuo</span><b>${100-opened.reduce((a,i)=>a+markets[i][1],0)}</b></div><div class="discovery-log">${opened.map(i=>`<div class="discovery"><b>${markets[i][0]}</b><br>Rotta attiva e presidiata.</div>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-world">Conferma la rete globale</button></div></div>`}
case'timeline':{const cards=[['1831','Mulino di don Nicola'],['1889','Essiccazione ad aria calda'],['1944','Ripartenza dai pezzi di recupero'],['2021','Marchio storico di interesse nazionale']];const picked=s.timeline||[];return `<div class="panel"><div class="panel-label">Curatela del patrimonio</div><h3>Costruisci il percorso di memoria</h3><div class="timeline-board">${cards.map((c,i)=>`<div class="time-slot"><h4>${c[0]}</h4><button class="time-card ${picked.includes(i)?'selected':''}" data-action="timeline" data-i="${i}">${c[1]}</button><p style="font-size:10px;color:#7a8791">${picked.includes(i)?'Pannello attivato':'Da attivare'}</p></div>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-timeline">Apri il percorso al pubblico</button></div>`}
}return''}
function slider(key,label,val,min,max,suffix){return `<div class="slider-row"><label>${label}</label><input type="range" min="${min}" max="${max}" value="${val}" data-slider="${key}"><div class="slider-value">${val}${suffix}</div></div>`}
function allocCard(k,l,v){return `<div class="alloc-card"><h4>${l}</h4><div class="alloc-value">${v}</div><div class="alloc-controls"><button class="round" data-action="alloc" data-key="${k}" data-delta="-1">−</button><button class="round" data-action="alloc" data-key="${k}" data-delta="1">+</button></div></div>`}
function renderAtlas(){return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Intelligenza territoriale</div><h2>Atlante della filiera</h2></div><p>Una lettura geografica del rapporto tra montagna, acqua, mulino, pastificio e reti globali. I nodi si attivano come dossier territoriali.</p></div><div class="atlas-grid"><div class="atlas-map"><button class="atlas-node n1" data-atlas="Maiella">Maiella · clima</button><button class="atlas-node n2" data-atlas="Sorgenti">Sorgenti · acqua</button><button class="atlas-node n3" data-atlas="Mulino">Mulino · semola</button><button class="atlas-node n4" data-atlas="Pastificio">Pastificio · trasformazione</button></div><div class="atlas-detail"><div class="data-card"><h3 id="atlasTitle">Sistema territoriale</h3><p id="atlasText">Seleziona un nodo per leggere la relazione tra risorsa, processo e identità.</p></div><div class="data-card"><h3>Indicatori dimostrativi del territorio</h3><div class="data-bars"><div class="data-bar"><span>Radicamento</span><i style="width:92%"></i><b>92</b></div><div class="data-bar"><span>Acqua</span><i style="width:76%"></i><b>76</b></div><div class="data-bar"><span>Capacità</span><i style="width:84%"></i><b>84</b></div><div class="data-bar"><span>Memoria</span><i style="width:88%"></i><b>88</b></div></div></div><div class="data-card"><h3>Una storia radicata nel territorio</h3><p>Montagna, acqua, sapere molitorio e capacità industriale si intrecciano in un percorso che parte da Fara San Martino e raggiunge le tavole di tutto il mondo.</p></div></div></div></div>`}
function renderMethod(){const steps=[['Grano duro','Materia prima e selezione'],['Mulino','Semola fresca accanto al pastificio'],['Impasto','Acqua e controllo del processo'],['Trafilatura','Forma e superficie'],['Essiccazione','Tempo, temperatura, qualità']];return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Intelligenza di processo</div><h2>Il metodo come sistema</h2></div><p>La qualità finale è il risultato di una catena: ogni fase protegge o indebolisce il lavoro precedente.</p></div><div class="method-flow">${steps.map((s,i)=>`<div class="method-step"><div class="num">${i+1}</div><h3>${s[0]}</h3><p>${s[1]}</p></div>`).join('')}</div><div class="atlas-grid" style="margin-top:18px"><div class="atlas-map" style="background-image:linear-gradient(rgba(0,50,90,.08),rgba(0,50,90,.68)),url('machine.jpg')"></div><div class="atlas-detail"><div class="data-card"><h3>Controllo di processo</h3><p>Il gioco trasforma temperatura, tempo, umidità e flussi in variabili interdipendenti. I valori sono simulati a fini didattici: ciò che conta è la coerenza della curva con il metodo.</p></div><div class="data-card"><h3>Perché è rilevante</h3><p>De Cecco presenta il proprio metodo come un continuum che parte dal mulino e arriva all'essiccazione, facendo del processo stesso un patrimonio di marca.</p></div></div></div></div>`}
function renderArchive(){return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Archivio vivo</div><h2>Archivio sbloccato</h2></div><p>Dodici snodi storici e produttivi vengono sbloccati attraverso le missioni e ricomposti in un archivio consultabile.</p></div><div class="archive-grid">${FACTS.map((f,i)=>{const unlocked=state.unlocked.includes(i);const imgs=['fara.jpg','wheat.jpg','factory.jpg','machine.jpg','fara.jpg','factory.jpg','machine.jpg','wheat.jpg','pasta.jpg','pasta.jpg','factory.jpg','fara.jpg'];return `<div class="artifact ${unlocked?'':'locked'}" style="background-image:url('${imgs[i]}');background-size:cover;background-position:center"><div class="artifact-copy"><small>${unlocked?f.year:'Archivio bloccato'}</small><h3>${unlocked?esc(f.title):'Completa la missione'}</h3><p>${unlocked?esc(f.text):'Il documento verrà rivelato durante il percorso.'}</p></div></div>`}).join('')}</div></div>`}
function renderRecipes(){const pasta=['Spaghetti','Penne rigate','Fusilli','Paccheri'],sauce=['Cacio e pepe','Pomodoro','Pesto','Ragù'],territory=['Roma','Abruzzo','Liguria','Emilia'];const sel=state.selectedRecipe;let score=0,msg='Scegli formato, condimento e territorio per costruire una proposta.';if(sel.pasta&&sel.sauce&&sel.territory){const combos={"Spaghetti|Cacio e pepe|Roma":98,"Penne rigate|Pomodoro|Abruzzo":88,"Fusilli|Pesto|Liguria":96,"Paccheri|Ragù|Emilia":82};score=combos[`${sel.pasta}|${sel.sauce}|${sel.territory}`]||68;msg=score>90?'Abbinamento molto coerente: forma, condimento e geografia raccontano la stessa esperienza.':score>80?'Abbinamento credibile, con una buona leggibilità territoriale.':'La combinazione è possibile, ma la coerenza territoriale risulta meno immediata.'}return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Geografia delle ricette</div><h2>Atlante delle occasioni</h2></div><p>Una sezione esplorativa che collega formato, condimento e territorio. Il punteggio è dimostrativo e rende visibile la coerenza culturale della proposta, senza pretendere di stabilire una verità gastronomica assoluta.</p></div><div class="recipe-lab"><div class="recipe-visual"><div><div class="kicker">Cultura alimentare</div><h2>La pasta come geografia</h2><p>Formato, condimento e territorio costruiscono racconti gastronomici differenti.</p></div></div><div class="recipe-controls"><div class="data-card"><h3>1. Formato</h3><div class="select-grid">${pasta.map(x=>`<button class="select-card ${sel.pasta===x?'active':''}" data-recipe="pasta" data-value="${x}"><b>${x}</b><span>Struttura e capacità di accogliere il condimento</span></button>`).join('')}</div></div><div class="data-card"><h3>2. Condimento</h3><div class="select-grid">${sauce.map(x=>`<button class="select-card ${sel.sauce===x?'active':''}" data-recipe="sauce" data-value="${x}"><b>${x}</b><span>Consistenza e intensità</span></button>`).join('')}</div></div><div class="data-card"><h3>3. Territorio</h3><div class="select-grid">${territory.map(x=>`<button class="select-card ${sel.territory===x?'active':''}" data-recipe="territory" data-value="${x}"><b>${x}</b><span>Contesto culturale</span></button>`).join('')}</div></div><div class="pairing-score"><strong>${score||'—'}</strong><span>/100</span><p>${msg}</p></div></div></div></div>`}
function bindDynamic(){document.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>{state.historyIndex=Number(b.dataset.story)||0;save();renderShell()});document.querySelectorAll('[data-slider]').forEach(el=>el.addEventListener('input',e=>{const k=e.target.dataset.slider;const map={purezza:'purity',umidita:'humidity',granulometria:'grind',temp:'temp',time:'time',air:'air'};state.missionState[map[k]]=Number(e.target.value);renderShell()}));document.querySelectorAll('[data-atlas]').forEach(b=>b.onclick=()=>{const d={Maiella:['Maiella · clima','La montagna crea vincoli climatici ma anche una forte identità geografica.'],Sorgenti:['Sorgenti · acqua','La relazione tra risorsa idrica, impasto e identità territoriale rende l’acqua un nodo strategico.'],Mulino:['Mulino · semola','Il mulino accanto al pastificio consente continuità tra selezione del grano e trasformazione.'],Pastificio:['Pastificio · trasformazione','Capacità industriale e memoria locale convivono nello stesso paesaggio produttivo.']}[b.dataset.atlas];document.getElementById('atlasTitle').textContent=d[0];document.getElementById('atlasText').textContent=d[1]});document.querySelectorAll('[data-recipe]').forEach(b=>b.onclick=()=>{state.selectedRecipe[b.dataset.recipe]=b.dataset.value;save();renderShell()})}
function completeMission(msg){if(!state.done.includes(state.mission)){state.done.push(state.mission);if(!state.unlocked.includes(MISSIONS[state.mission].fact))state.unlocked.push(MISSIONS[state.mission].fact);for(const[k,v]of Object.entries(MISSIONS[state.mission].kpi||{}))state.kpi[k]=Math.min(100,(state.kpi[k]||0)+v);save();showToast(msg||'Missione completata')}renderShell()}
function handleAction(a,el){const s=state.missionState,m=MISSIONS[state.mission];if(a==='open-history'){state.started=true;state.view='history';save();renderShell();return}if(a==='start'){state.started=true;state.view='mission';save();renderShell();return}if(a==='credits'){showModal('Crediti e fonti',`<div class="credit-list"><b>Fonti storiche e di metodo</b><br>De Cecco, “Storia”; De Cecco, “Il nostro metodo”; De Cecco, “Prodotti”; De Cecco, “Ricette”.<br><br><b>Immagini Wikimedia Commons</b><br>Fara San Martino (ritaglio) — Zitumassin/Teseo, CC BY 3.0.<br>Pastificio De Cecco, Fara San Martino — Zitumassin, CC BY 3.0.<br><i>Triticum durum</i> sl3 — Stefan.lefnaer, CC BY-SA 4.0.<br>Spaghetti cacio e pepe — Der Zahir, CC BY-SA 4.0.<br><i>Early Industrial Pasta Machines P002</i> — DEMACO, CC BY-SA 4.0.<br><br>Le immagini sono utilizzate come materiali di repertorio. Questa esperienza ha finalità dimostrative e celebrative.</div>`);return}if(a==='toggle-panel'){state.missionPanel=!state.missionPanel;renderShell();return}if(a==='reset-mission'){resetMissionState();save();showToast('Missione reimpostata');renderShell();return}if(a==='next'){if(!state.done.includes(state.mission))return;if(state.mission<MISSIONS.length-1){state.mission++;resetMissionState();state.view='mission';save();renderShell()}else showFinal();return}
if(a==='explore'){s['n'+el.dataset.i]=true;save();renderShell();return}if(a==='complete-origin'){if([0,1,2,3].every(i=>s['n'+i]))completeMission('Geografia delle origini ricostruita');return}
if(a==='validate-mill'){let score=Math.round(100-Math.abs((s.purity??72)-84)*1.2-Math.abs((s.humidity??48)-42)*1.1-Math.abs((s.grind??55)-61)*.9);score>=78?completeMission('Lotto di farina validato'):showToast('La curva non è ancora stabile');return}
if(a==='alloc'){s.alloc=s.alloc||{mill:34,lab:33,people:33};const k=el.dataset.key,d=Number(el.dataset.delta);const total=Object.values(s.alloc).reduce((x,y)=>x+y,0);if(d>0&&total>=100)return;if(d<0&&s.alloc[k]<=0)return;s.alloc[k]+=d;renderShell();return}
if(a==='validate-allocation'){const x=s.alloc||{mill:34,lab:33,people:33},total=x.mill+x.lab+x.people;Math.min(x.mill,x.lab,x.people)>=30&&total===100?completeMission('Pastificio fondato nel 1886'):showToast('Serve equilibrio e un totale esatto di 100');return}
if(a==='validate-drying'){let temp=s.temp??(m.type==='drying'?52:48),time=s.time??(m.type==='drying'?70:82),air=s.air??55;let q=Math.round(100-Math.abs(temp-48)*1.2-Math.abs(time-82)*.45-Math.abs(air-56)*.55),c=Math.round(temp*.55+air*.38+(100-time)*.12);(q>=82&&temp<=60&&(m.type!=='method'||(q>=85&&c<70)))?completeMission('Curva di essiccazione approvata'):showToast('Rivedi tempo, temperatura e flusso');return}
if(a==='choice'){s.choice=Number(el.dataset.i);renderShell();return}if(a==='validate-choice'){s.choice===1?completeMission('Vincolo climatico trasformato in innovazione'):showToast('La strategia non garantisce continuità e qualità');return}
if(a==='brand'){const i=Number(el.dataset.i);s['b'+i]=!s['b'+i];renderShell();return}if(a==='validate-brand'){const chosen=[0,1,2,3,4,5].filter(i=>s['b'+i]);chosen.length===3&&[0,1,2].every(i=>chosen.includes(i))?completeMission('Identità del 1952 composta'):showToast('Servono territorio, materia prima e riconoscibilità');return}
if(a==='salvage'){const i=Number(el.dataset.i);s['z'+i]=!s['z'+i];renderShell();return}if(a==='validate-salvage'){const good=[0,1,2,3].filter(i=>s['z'+i]).length,bad=[4,5].filter(i=>s['z'+i]).length;good>=4&&bad===0?completeMission('Piano di recupero completato'):showToast('Recupera le risorse utili senza assorbire i danni irreversibili');return}
if(a==='part'){s.order=s.order||[];const i=Number(el.dataset.i);if(!s.order.includes(i))s.order.push(i);renderShell();return}if(a==='validate-assembly'){JSON.stringify(s.order||[])===JSON.stringify([0,1,2,3])?completeMission('Linea minima riavviata nel 1944'):(s.order=[],showToast('La sequenza deve seguire impasto, lavorazione, formatura, essiccazione'),renderShell());return}
if(a==='portfolio'){const i=Number(el.dataset.i);s['p'+i]=!s['p'+i];renderShell();return}if(a==='validate-portfolio'){const chosen=[0,1,2,3,4,5].filter(i=>s['p'+i]);const vals=[34,24,26,23,-20,-8];const score=chosen.reduce((a,i)=>a+vals[i],0);chosen.length===3&&score>=80?completeMission('Portafoglio coerente approvato'):showToast('Scegli tre categorie e supera 80 di coerenza');return}
if(a==='market'){s.markets=s.markets||[];const i=Number(el.dataset.i);if(!s.markets.includes(i))s.markets.push(i);renderShell();return}if(a==='validate-world'){(s.markets||[]).length===3?completeMission('Rotte globali attivate'):showToast('Apri tutti e tre i mercati');return}
if(a==='timeline'){s.timeline=s.timeline||[];const i=Number(el.dataset.i);if(!s.timeline.includes(i))s.timeline.push(i);renderShell();return}if(a==='validate-timeline'){(s.timeline||[]).length===4?completeMission('Percorso di memoria aperto'):showToast('Attiva tutti i pannelli');return}}
function showModal(title,html,showClose=true){document.querySelector('.modal')?.remove();document.body.insertAdjacentHTML('beforeend',`<div class="modal" role="dialog" aria-modal="true" aria-label="${esc(title)}"><div class="modal-card"><h2>${title}</h2>${html}${showClose?'<div class="modal-actions"><button class="primary" data-action="close-modal">Chiudi</button></div>':''}</div></div>`)}
function showFinal(){const avg=Math.round(Object.values(state.kpi).reduce((a,b)=>a+b,0)/5);showModal('Il metodo è nelle tue mani',`<p>Hai completato tutte le missioni e trasformato dodici snodi storici e produttivi in un percorso di gestione, esplorazione, ricostruzione e cultura alimentare.</p><div class="mission-stats" style="color:#fff"><div class="stat"><small>Missioni</small><b>12/12</b></div><div class="stat"><small>Indice finale</small><b class="yellow">${avg}</b></div></div><p><b>Profilo:</b> ${avg>=85?'Custode del Metodo':avg>=70?'Mastro della Filiera':'Apprendista del Territorio'}.</p><div class="modal-actions"><button class="secondary" data-action="restart-game">Ricomincia</button><button class="primary" data-action="close-modal">Esplora liberamente</button></div>`,false)}
document.addEventListener('click',e=>{const v=e.target.closest('[data-view]');if(v){state.view=v.dataset.view;state.missionPanel=false;save();renderShell();return}const b=e.target.closest('[data-action]');if(!b)return;const action=b.dataset.action;if(action==='close-modal'){b.closest('.modal')?.remove();return}if(action==='restart-game'){try{localStorage.removeItem(STORAGE_KEY)}catch(e){}location.reload();return}handleAction(action,b)});
try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));if(saved&&saved.started){Object.assign(state,saved);state.kpi={...INITIAL_KPI,...(saved.kpi||{})};state.done=[...new Set(saved.done||[])];state.unlocked=[...new Set(saved.unlocked||[])];state.missionState=saved.missionState||{};state.selectedRecipe=saved.selectedRecipe||{pasta:null,sauce:null,territory:null};state.historyIndex=Number.isInteger(saved.historyIndex)?saved.historyIndex:0}}catch(e){}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelector('.modal')?.remove()});
state.started?renderShell():renderIntro();
</script>
</body>
