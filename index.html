<style>

@media(max-width:780px){.hero-content{grid-template-columns:1fr;width:min(100% - 24px,620px)}.hero h1{font-size:64px}.hero-card{padding:18px}.topbar{grid-template-columns:1fr auto}.chapterbar{display:none}.gamegrid{grid-template-columns:1fr;grid-template-rows:1fr 72px}.navrail{position:fixed;bottom:0;top:auto;left:0;right:0;height:72px;z-index:40;flex-direction:row;border-right:0;border-top:1px solid var(--line);padding:6px;background:rgba(2,18,35,.96)}.navbtn{flex:1;min-height:58px}.navbtn svg{width:20px;height:20px}.stage-inner{padding:10px 10px 86px}.stage-card{min-height:auto}.mission-hero{height:230px}.workspace{padding:14px}.alloc-grid,.choice-grid,.timeline-board,.method-flow{grid-template-columns:1fr 1fr}.assembly{grid-template-columns:1fr}.archive-grid{grid-template-columns:1fr}.missionbar{top:74px;height:calc(100vh - 146px)}.top-actions .top-btn:first-child{display:none}}
@media(max-width:520px){.hero{align-items:start;padding-top:60px}.hero-content{margin-bottom:18px}.hero h1{font-size:52px}.hero-copy{font-size:14px}.era-row{grid-template-columns:1fr 1fr}.brand small{display:none}.brand b{font-size:14px}.mission-hero-copy h2{font-size:29px}.workspace-grid{grid-template-columns:1fr}.alloc-grid,.choice-grid,.timeline-board,.method-flow,.select-grid{grid-template-columns:1fr}.slider-row{grid-template-columns:1fr 60px}.slider-row label{grid-column:1/-1}.atlas-map{min-height:400px}.recipe-visual{min-height:360px}}

<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
"use strict";
const ERA=[
 {name:"Le Origini",years:"1831–1886",image:"fara.jpg"},
 {name:"L'Innovazione",years:"1889–1908",image:"machine.jpg"},
 {name:"La Rinascita",years:"1943–1950",image:"factory.jpg"},
 {name:"Il Mondo",years:"Oggi",image:"pasta.jpg"}
];
const FACTS=[
 {year:"1831",title:"Fara San Martino",text:"La storia della famiglia De Cecco nasce a Fara San Martino, alle falde della Maiella, dove l'acqua pura di montagna entra ancora oggi nel racconto del metodo."},
 {year:"1831",title:"La miglior farina del contado",text:"Don Nicola De Cecco macinava nel suo mulino in pietra quella che veniva ricordata come “la miglior farina del contado”."},
 {year:"1886",title:"Nasce il pastificio",text:"Filippo Giovanni De Cecco amplia l'attività di famiglia alla produzione di pasta e fonda il Pastificio De Cecco."},
 {year:"1889",title:"L'essiccazione artificiale",text:"Filippo De Cecco mette a punto un impianto di essiccazione ad aria calda che libera la produzione dai limiti del clima."},
 {year:"1889",title:"Una risposta alla montagna",text:"A Fara San Martino l'essiccazione al sole era poco affidabile: la posizione ai piedi della montagna trasformò un vincolo geografico in innovazione industriale."},
 {year:"1908",title:"La contadina con i covoni",text:"La figura della contadina abruzzese con due covoni di grano diventa il segno identitario del marchio De Cecco."},
 {year:"1943",title:"Lo stabilimento depredato",text:"Durante la ritirata tedesca lo stabilimento di Fara San Martino viene occupato e depredato di macchinari, attrezzi e scorte."},
 {year:"1944",title:"Ripartire dai pezzi di recupero",text:"La produzione riparte con una piccola macchina costruita utilizzando pezzi di recupero: resilienza e ingegno diventano parte della cultura d'impresa."},
 {year:"Oggi",title:"Lenta essiccazione",text:"Il metodo contemporaneo conserva l'idea della lenta essiccazione a bassa temperatura per proteggere gusto e qualità del grano."},
 {year:"Oggi",title:"Oltre la pasta",text:"Il portafoglio comprende anche olio extravergine, derivati del pomodoro, sughi e prodotti da forno."},
 {year:"Oggi",title:"Dal borgo al mondo",text:"La pasta De Cecco raggiunge Europa, Americhe e Giappone, portando con sé la cultura alimentare italiana."},
 {year:"Oggi",title:"Marchio storico",text:"Il marchio è iscritto nel registro dei marchi storici di interesse nazionale, riconoscimento alla continuità dell'impresa e del suo patrimonio."}
];
const MISSIONS=[
 {era:0,title:"Radica l'impresa nel territorio",year:"1831",type:"explore",image:"fara.jpg",desc:"Esplora il sistema territoriale che rende possibile la nascita dell'impresa: borgo, montagna, acqua e mulino.",objective:"Attiva tutti i nodi territoriali e ricostruisci la geografia delle origini.",fact:0,kpi:{heritage:7,quality:3}},
 {era:0,title:"Fai rendere il mulino di don Nicola",year:"1831",type:"mill",image:"wheat.jpg",desc:"Configura macinazione, purezza e umidità per ottenere una semola stabile senza sacrificare resa e qualità.",objective:"Porta l'indice di farina tra 78 e 92.",fact:1,kpi:{quality:8,heritage:4}},
 {era:0,title:"Fonda il pastificio",year:"1886",type:"allocation",image:"factory.jpg",desc:"Hai 100 unità di capitale. Distribuiscile tra mulino, laboratorio e persone per creare una struttura equilibrata.",objective:"Raggiungi almeno 30 su ogni leva senza superare il budget.",fact:2,kpi:{innovation:5,heritage:5,quality:4}},
 {era:1,title:"Progetta l'essiccatoio del 1889",year:"1889",type:"drying",image:"machine.jpg",desc:"Trasforma un limite climatico in vantaggio industriale. Regola temperatura, tempo e flusso d'aria.",objective:"Ottieni un equilibrio superiore a 82 senza superare 60 °C.",fact:3,kpi:{innovation:10,quality:6}},
 {era:1,title:"Domina il clima di montagna",year:"1889",type:"choice",image:"fara.jpg",desc:"Il clima di Fara è instabile. Devi scegliere una strategia capace di garantire continuità e qualità.",objective:"Seleziona la strategia con il miglior equilibrio tra affidabilità e identità.",fact:4,kpi:{innovation:6,quality:4}},
 {era:1,title:"Costruisci il simbolo del 1908",year:"1908",type:"brand",image:"wheat.jpg",desc:"Definisci gli elementi visuali che devono condensare territorio, lavoro e materia prima in un unico segno.",objective:"Componi il marchio con i tre elementi identitari corretti.",fact:5,kpi:{heritage:8,reach:4}},
 {era:2,title:"Valuta i danni del 1943",year:"1943",type:"salvage",image:"factory.jpg",desc:"Lo stabilimento è stato depredato. Esamina le aree, recupera ciò che può essere salvato e proteggi le competenze residue.",objective:"Recupera almeno quattro risorse essenziali.",fact:6,kpi:{resilience:10,heritage:3}},
 {era:2,title:"Ricostruisci la linea del 1944",year:"1944",type:"assembly",image:"machine.jpg",desc:"Rimetti in moto la produzione assemblando una linea minima con i pezzi disponibili.",objective:"Colloca i moduli nella corretta sequenza operativa.",fact:7,kpi:{resilience:9,innovation:4}},
 {era:3,title:"Proteggi il metodo lento",year:"Oggi",type:"method",image:"pasta.jpg",desc:"Bilancia efficienza, tempo, temperatura e qualità proteica. La velocità non è l'unico indicatore di successo.",objective:"Mantieni qualità sopra 85 e consumo sotto 70.",fact:8,kpi:{quality:9,innovation:4}},
 {era:3,title:"Espandi il portafoglio",year:"Oggi",type:"portfolio",image:"pasta.jpg",desc:"Costruisci un portafoglio coerente: la crescita deve ampliare il mondo De Cecco senza diluire il metodo.",objective:"Seleziona tre categorie con coerenza complessiva superiore a 80.",fact:9,kpi:{reach:7,innovation:5}},
 {era:3,title:"Disegna le rotte globali",year:"Oggi",type:"world",image:"factory.jpg",desc:"Porta il prodotto nei mercati internazionali mantenendo controllo, identità e sostenibilità delle rotte.",objective:"Apri Europa, Americhe e Giappone con un budget massimo di 100.",fact:10,kpi:{reach:12,quality:3}},
 {era:3,title:"Consegna la memoria al futuro",year:"Oggi",type:"timeline",image:"fara.jpg",desc:"Cura un percorso storico capace di tenere insieme origine, innovazione, rinascita e riconoscimento nazionale.",objective:"Completa i quattro pannelli del percorso di memoria.",fact:11,kpi:{heritage:10,reach:5}}
];
const state={started:false,mission:0,view:"mission",done:[],unlocked:[],kpi:{heritage:48,quality:54,innovation:36,resilience:42,reach:18},budget:100,missionState:{},selectedRecipe:{pasta:null,sauce:null,territory:null},missionPanel:false};
const app=document.getElementById("app");
const toast=document.getElementById("toast");
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function icon(name){const icons={mission:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12h16M12 4v16"/><circle cx="12" cy="12" r="7"/></svg>',atlas:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6l5-2 8 2 5-2v14l-5 2-8-2-5 2z"/><path d="M8 4v14M16 6v14"/></svg>',method:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M7 4v6M17 4v6M5 14h14M8 11v6M16 11v6"/></svg>',archive:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16v4H4zM6 9h12v11H6z"/><path d="M9 13h6"/></svg>',recipes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3v8M3 3v5c0 2 1 3 3 3s3-1 3-3V3M6 11v10M16 3c3 3 3 8 0 11v7"/></svg>'};return icons[name]||''}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
function save(){localStorage.setItem('dececcoLegacyGame',JSON.stringify(state))}
function resetMissionState(){state.missionState={}}
function kpiHtml(){return Object.entries({heritage:'Eredità',quality:'Qualità',innovation:'Innovazione',resilience:'Resilienza',reach:'Mondo'}).map(([k,l])=>`<div class="kpi-row"><span>${l}</span><div class="kpi-track"><i style="width:${state.kpi[k]}%"></i></div><b>${state.kpi[k]}</b></div>`).join('')}
function renderIntro(){app.innerHTML=`<section class="hero"><div class="hero-bg"></div><div class="hero-content"><div><div class="kicker">Casogeographics food heritage experience</div><h1>Dal Mulino<span>al Mondo</span></h1><p class="hero-copy">Non un quiz, ma un <b>gioco di esplorazione, gestione e ricostruzione</b>. Attraversa quattro epoche, governa il metodo, leggi il territorio, ricostruisci la produzione e porta la cultura De Cecco nel mondo.</p><div class="hero-meta"><span class="pill">12 missioni</span><span class="pill">Mappe interattive</span><span class="pill">Metodo produttivo</span><span class="pill">Ricette e territori</span><span class="pill">Archivio storico</span></div></div><div class="hero-card"><div class="kicker" style="color:var(--red)">Missione</div><h2>Diventa Custode del Metodo</h2><p>Ogni scelta modifica qualità, innovazione, resilienza, patrimonio e capacità di raggiungere il mondo. Le informazioni storiche dell'index originale restano tutte, ma diventano azioni, sistemi e conseguenze.</p><div class="era-row">${ERA.map(e=>`<div class="era-chip"><b>${e.name}</b><span>${e.years}</span></div>`).join('')}</div><button class="start-btn" data-action="start">Entra nel mondo De Cecco</button><div class="small-note">Concept demo non ufficiale · immagini di riferimento con crediti inclusi</div></div></div></section>`}
function renderShell(){const m=MISSIONS[state.mission];app.innerHTML=`<section class="shell"><header class="topbar"><div class="brand"><div class="brandmark">DC</div><div><b>Dal Mulino al Mondo</b><small>De Cecco Legacy Game</small></div></div><div class="chapterbar">${ERA.map((e,i)=>`<div class="chapterdot ${i<m.era?'done':i===m.era?'active':''}"><i></i></div>`).join('')}</div><div class="top-actions"><button class="top-btn" data-action="credits">Crediti</button><button class="top-btn" data-action="toggle-panel">Missione</button></div></header><div class="gamegrid"><nav class="navrail">${[['mission','Missione'],['atlas','Atlante'],['method','Metodo'],['archive','Archivio'],['recipes','Ricette']].map(([v,l])=>`<button class="navbtn ${state.view===v?'active':''}" data-view="${v}">${icon(v)}<span>${l}</span></button>`).join('')}</nav><main class="stage"><div class="stage-inner"><div class="stage-card">${renderView()}</div></div></main><aside class="missionbar ${state.missionPanel?'open':''}">${renderMissionBar()}</aside></div></section>`;bindDynamic();}
function renderMissionBar(){const m=MISSIONS[state.mission],completed=state.done.includes(state.mission);return `<div class="step-tag">Missione ${state.mission+1} / ${MISSIONS.length}</div><h3>${esc(m.title)}</h3><p>${esc(m.objective)}</p><div class="mission-stats"><div class="stat"><small>Epoca</small><b>${esc(ERA[m.era].name)}</b></div><div class="stat"><small>Anno</small><b class="yellow">${esc(m.year)}</b></div><div class="stat"><small>Archivi</small><b>${state.unlocked.length}/12</b></div><div class="stat"><small>Avanzamento</small><b>${Math.round(state.done.length/MISSIONS.length*100)}%</b></div></div><div class="kpi-list">${kpiHtml()}</div><button class="next-btn" data-action="next" ${completed?'':'disabled'}>${state.mission===MISSIONS.length-1?'Vedi il report finale':'Passa alla missione successiva'}</button><button class="ghost-btn" data-action="reset-mission">Ricomincia questa missione</button>`}
function renderView(){if(state.view==='mission')return renderMission();if(state.view==='atlas')return renderAtlas();if(state.view==='method')return renderMethod();if(state.view==='archive')return renderArchive();return renderRecipes();}
function hero(m){return `<div class="mission-hero" style="background-image:url('${m.image}')"><div class="mission-hero-copy"><small>${ERA[m.era].name} · ${m.year}</small><h2>${esc(m.title)}</h2><p>${esc(m.desc)}</p></div></div>`}
function renderMission(){const m=MISSIONS[state.mission];return hero(m)+`<div class="workspace">${renderMissionType(m)}</div>`}
function renderMissionType(m){const s=state.missionState;switch(m.type){
case'explore':{const nodes=[['Borgo','Fara è il punto di origine della storia familiare e industriale.'],['Maiella','La montagna definisce clima, paesaggio e risorse.'],['Acqua','Le sorgenti diventano parte del racconto del metodo.'],['Mulino','Qui la materia prima incontra il sapere del mugnaio.']];return `<div class="workspace-grid"><div class="hotspot-map">${nodes.map((n,i)=>`<button class="hotspot ${s['n'+i]?'done':''}" data-action="explore" data-i="${i}">${n[0]}</button>`).join('')}</div><div class="panel"><div class="panel-label">Field notes</div><h3>Geografia delle origini</h3><p>Attiva i nodi per trasformare il paesaggio in un sistema produttivo.</p><div class="discovery-log">${nodes.map((n,i)=>s['n'+i]?`<div class="discovery"><b>${n[0]}</b><br>${n[1]}</div>`:'').join('')}</div></div></div>`}
case'mill':{let purity=s.purity??72,humidity=s.humidity??48,grind=s.grind??55;let score=Math.round(100-Math.abs(purity-84)*1.2-Math.abs(humidity-42)*1.1-Math.abs(grind-61)*.9);return `<div class="workspace-grid"><div class="panel"><div class="panel-label">Mill control</div><h3>Configura la macinazione</h3><div class="slider-box">${slider('purezza','Purezza del grano',purity,50,100,'%')}${slider('umidita','Umidità',humidity,20,70,'%')}${slider('granulometria','Granulometria',grind,20,90,'')}</div><div class="process-meter"><i style="left:${Math.max(0,Math.min(100,score))}%"></i></div><div class="result-card ${score<78?'bad':''}">Indice di farina: <b>${score}</b>. ${score>=78&&score<=92?'Profilo stabile: puoi validare il lotto.':'Ribilancia i parametri per evitare perdita di resa o qualità.'}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-mill">Valida il lotto</button></div><div class="panel"><div class="panel-label">Obiettivo</div><h3>La miglior farina del contado</h3><p>Il punteggio non premia il massimo assoluto di ogni parametro, ma il loro equilibrio. La qualità nasce dalla relazione tra materia prima, umidità e lavoro del mugnaio.</p></div></div>`}
case'allocation':{const a=s.alloc||{mill:34,lab:33,people:33};return `<div class="panel"><div class="panel-label">Capital allocation</div><h3>Costruisci un'impresa equilibrata</h3><p>Distribuisci 100 unità. Nessuna leva può essere trascurata.</p><div class="alloc-grid">${allocCard('mill','Mulino',a.mill)}${allocCard('lab','Pastificio',a.lab)}${allocCard('people','Persone',a.people)}</div><div class="budget-line"><span>Capitale allocato</span><b>${a.mill+a.lab+a.people}/100</b></div><button class="secondary-button" style="margin-top:14px" data-action="validate-allocation">Costituisci il pastificio</button></div>`}
case'drying':case'method':{let temp=s.temp??(m.type==='drying'?52:48),time=s.time??(m.type==='drying'?70:82),air=s.air??55;let quality=Math.round(100-Math.abs(temp-48)*1.2-Math.abs(time-82)*.45-Math.abs(air-56)*.55);let consumption=Math.round(temp*.55+air*.38+(100-time)*.12);return `<div class="workspace-grid"><div class="panel"><div class="panel-label">Thermal lab</div><h3>${m.type==='drying'?'Prototipo di essiccazione':'Curva del metodo lento'}</h3><div class="slider-box">${slider('temp','Temperatura',temp,30,90,'°C')}${slider('time','Tempo',time,30,100,'h')}${slider('air','Flusso d’aria',air,20,90,'%')}</div><div class="result-card ${quality<82?'bad':''}">Qualità stimata <b>${quality}</b> · Consumo <b>${consumption}</b>. ${quality>=82&&temp<=60?'Curva coerente con una logica lenta e controllata.':'La curva sta comprimendo troppo il processo.'}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-drying">Valida la curva</button></div><div class="panel"><div class="panel-label">Trade-off</div><h3>Il tempo come ingrediente</h3><p>Accelerare riduce il tempo di linea, ma aumenta il rischio di compromettere struttura e identità. Il gioco premia una soluzione industrialmente leggibile, non la lentezza fine a sé stessa.</p></div></div>`}
case'choice':{const opts=[['Essiccazione al sole','Dipendenza elevata dal clima, investimento minimo.',['+Tradizione','−Continuità']],['Aria calda controllata','Controllo del processo, qualità replicabile e indipendenza dal meteo.',['+Qualità','+Affidabilità']],['Produzione stagionale','Riduce il rischio, ma limita crescita e disponibilità.',['+Prudenza','−Scala']]];return `<div class="panel"><div class="panel-label">Scenario room</div><h3>Strategia climatica</h3><div class="choice-grid">${opts.map((o,i)=>`<button class="choice-card ${s.choice===i?'selected':''}" data-action="choice" data-i="${i}"><h4>${o[0]}</h4><p>${o[1]}</p><div class="impact">${o[2].map(x=>`<span>${x}</span>`).join('')}</div></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-choice">Conferma la strategia</button></div>`}
case'brand':{const items=[['Donna abruzzese','Lavoro e territorio'],['Covoni di grano','Materia prima'],['Blu e giallo','Riconoscibilità'],['Motoscafo','Velocità'],['Grattacielo','Modernità astratta'],['Corona reale','Prestigio']];return `<div class="panel"><div class="panel-label">Identity studio</div><h3>Componi il segno del 1908</h3><p>Scegli tre elementi. Il sistema deve raccontare origine, materia e riconoscibilità.</p><div class="choice-grid">${items.map((o,i)=>`<button class="choice-card ${s['b'+i]?'selected':''}" data-action="brand" data-i="${i}"><h4>${o[0]}</h4><p>${o[1]}</p></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-brand">Deposita il marchio</button></div>`}
case'salvage':{const zones=[['Archivio ricette','heritage'],['Motore ausiliario','resilience'],['Trafila','quality'],['Quaderni tecnici','innovation'],['Scorte compromesse','risk'],['Linea danneggiata','risk']];return `<div class="panel"><div class="panel-label">Recovery map</div><h3>Recupera ciò che può far ripartire l'impresa</h3><div class="choice-grid">${zones.map((z,i)=>`<button class="choice-card ${s['z'+i]?'selected':''}" data-action="salvage" data-i="${i}"><h4>${z[0]}</h4><p>${z[1]==='risk'?'Area ad alto costo di recupero':'Risorsa riutilizzabile'}</p></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-salvage">Chiudi il piano di recupero</button></div>`}
case'assembly':{const parts=['Miscelatore','Gramola','Pressa','Essiccatoio'];const order=s.order||[];return `<div class="assembly"><div class="panel"><div class="panel-label">Componenti</div><h3>Pezzi disponibili</h3><div class="parts">${parts.map((p,i)=>`<button class="part ${order.includes(i)?'used':''}" data-action="part" data-i="${i}"><span class="part-icon">${i+1}</span><b>${p}</b></button>`).join('')}</div></div><div class="panel"><div class="panel-label">Linea minima</div><h3>Sequenza operativa</h3><div class="slots">${[0,1,2,3].map((_,i)=>`<div class="slot ${order[i]!=null?'filled':''}"><span class="slot-num">${i+1}</span><b>${order[i]!=null?parts[order[i]]:'Seleziona un modulo'}</b></div>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-assembly">Avvia la linea</button></div></div>`}
case'portfolio':{const items=[['Pasta','Cuore del metodo',34],['Olio EVO','Cultura mediterranea',24],['Pomodoro e sughi','Servizio e gusto',26],['Prodotti da forno','Nuove occasioni',23],['Energy drink','Fuori identità',-20],['Snack dolci','Coerenza debole',-8]];return `<div class="panel"><div class="panel-label">Portfolio strategy</div><h3>Espandi senza diluire</h3><div class="choice-grid">${items.map((o,i)=>`<button class="choice-card ${s['p'+i]?'selected':''}" data-action="portfolio" data-i="${i}"><h4>${o[0]}</h4><p>${o[1]}</p><div class="impact"><span>Coerenza ${o[2]>0?'+':''}${o[2]}</span></div></button>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-portfolio">Approva il portafoglio</button></div>`}
case'world':{const markets=[['Europa',24,38,120,210],['Americhe',38,25,470,175],['Giappone',38,28,770,200]];const opened=s.markets||[];return `<div class="workspace-grid"><div class="worldmap"><svg viewBox="0 0 900 420" aria-label="Mappa dei mercati"><path class="land" d="M95 140l95-48 95 30 30 60-76 52-88-17zM365 100l94-34 94 48-20 84-83 14-55-39zM580 104l173-44 95 76-43 97-132 23-87-71zM367 265l104-36 44 62-39 92-83-11z"/><circle cx="405" cy="177" r="9" fill="#c8102e"/><text x="418" y="180" fill="#17384d" font-size="12" font-weight="900">Fara San Martino</text>${markets.map((m,i)=>`<g class="market ${opened.includes(i)?'unlocked':''}" data-action="market" data-i="${i}"><circle cx="${m[3]}" cy="${m[4]}" r="12"/><text x="${m[3]+18}" y="${m[4]+4}">${m[0]} · ${m[1]}</text></g>${opened.includes(i)?`<path class="route-line" d="M405 177 Q${(405+m[3])/2} ${110+i*45} ${m[3]} ${m[4]}"/>`:''}`).join('')}</svg></div><div class="panel"><div class="panel-label">Export desk</div><h3>Budget rotte</h3><p>Apri i tre mercati. Ogni rotta assorbe capitale e richiede presidio.</p><div class="budget-line"><span>Budget residuo</span><b>${100-opened.reduce((a,i)=>a+markets[i][1],0)}</b></div><div class="discovery-log">${opened.map(i=>`<div class="discovery"><b>${markets[i][0]}</b><br>Rotta attiva e presidiata.</div>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-world">Conferma la rete globale</button></div></div>`}
case'timeline':{const cards=[['1831','Mulino di don Nicola'],['1889','Essiccazione ad aria calda'],['1944','Ripartenza dai pezzi di recupero'],['Oggi','Marchio storico nazionale']];const picked=s.timeline||[];return `<div class="panel"><div class="panel-label">Heritage curation</div><h3>Costruisci il percorso di memoria</h3><div class="timeline-board">${cards.map((c,i)=>`<div class="time-slot"><h4>${c[0]}</h4><button class="time-card ${picked.includes(i)?'selected':''}" data-action="timeline" data-i="${i}">${c[1]}</button><p style="font-size:10px;color:#7a8791">${picked.includes(i)?'Pannello attivato':'Da attivare'}</p></div>`).join('')}</div><button class="secondary-button" style="margin-top:14px" data-action="validate-timeline">Apri il percorso al pubblico</button></div>`}
}return''}
function slider(key,label,val,min,max,suffix){return `<div class="slider-row"><label>${label}</label><input type="range" min="${min}" max="${max}" value="${val}" data-slider="${key}"><div class="slider-value">${val}${suffix}</div></div>`}
function allocCard(k,l,v){return `<div class="alloc-card"><h4>${l}</h4><div class="alloc-value">${v}</div><div class="alloc-controls"><button class="round" data-action="alloc" data-key="${k}" data-delta="-1">−</button><button class="round" data-action="alloc" data-key="${k}" data-delta="1">+</button></div></div>`}
function renderAtlas(){return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Territory intelligence</div><h2>Atlante della filiera</h2></div><p>Una lettura geografica del rapporto tra montagna, acqua, mulino, pastificio e reti globali. I nodi si attivano come dossier, non come semplici decorazioni.</p></div><div class="atlas-grid"><div class="atlas-map"><button class="atlas-node n1" data-atlas="Maiella">Maiella · clima</button><button class="atlas-node n2" data-atlas="Sorgenti">Sorgenti · acqua</button><button class="atlas-node n3" data-atlas="Mulino">Mulino · semola</button><button class="atlas-node n4" data-atlas="Pastificio">Pastificio · trasformazione</button></div><div class="atlas-detail"><div class="data-card"><h3 id="atlasTitle">Sistema territoriale</h3><p id="atlasText">Seleziona un nodo per leggere la relazione tra risorsa, processo e identità.</p></div><div class="data-card"><h3>Indicatori del territorio</h3><div class="data-bars"><div class="data-bar"><span>Radicamento</span><i style="width:92%"></i><b>92</b></div><div class="data-bar"><span>Acqua</span><i style="width:76%"></i><b>76</b></div><div class="data-bar"><span>Capacità</span><i style="width:84%"></i><b>84</b></div><div class="data-bar"><span>Memoria</span><i style="width:88%"></i><b>88</b></div></div></div><div class="data-card"><h3>Casogeographics lens</h3><p>Il territorio non è sfondo: condiziona tecnologia, racconto del marchio, disponibilità di risorse e capacità di trasformare un prodotto locale in cultura globale.</p></div></div></div></div>`}
function renderMethod(){const steps=[['Grano duro','Materia prima e selezione'],['Mulino','Semola fresca accanto al pastificio'],['Impasto','Acqua e controllo del processo'],['Trafilatura','Forma e superficie'],['Essiccazione','Tempo, temperatura, qualità']];return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Process intelligence</div><h2>Il metodo come sistema</h2></div><p>La qualità finale è il risultato di una catena: ogni fase protegge o indebolisce il lavoro precedente.</p></div><div class="method-flow">${steps.map((s,i)=>`<div class="method-step"><div class="num">${i+1}</div><h3>${s[0]}</h3><p>${s[1]}</p></div>`).join('')}</div><div class="atlas-grid" style="margin-top:18px"><div class="atlas-map" style="background-image:linear-gradient(rgba(0,50,90,.08),rgba(0,50,90,.68)),url('machine.jpg')"></div><div class="atlas-detail"><div class="data-card"><h3>Controllo di processo</h3><p>Il gioco trasforma temperatura, tempo, umidità e flussi in variabili interdipendenti. Non esiste un unico numero “giusto”: esiste una curva coerente con il metodo.</p></div><div class="data-card"><h3>Perché è rilevante</h3><p>De Cecco presenta il proprio metodo come un continuum che parte dal mulino e arriva all'essiccazione, facendo del processo stesso un patrimonio di marca.</p></div></div></div></div>`}
function renderArchive(){return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Living archive</div><h2>Archivio sbloccato</h2></div><p>Le dodici informazioni dell'index originale restano integralmente nel progetto, ma vengono conquistate attraverso missioni e non richieste come domande a risposta multipla.</p></div><div class="archive-grid">${FACTS.map((f,i)=>{const unlocked=state.unlocked.includes(i);const imgs=['fara.jpg','wheat.jpg','factory.jpg','machine.jpg','fara.jpg','wheat.jpg','factory.jpg','machine.jpg','pasta.jpg','pasta.jpg','factory.jpg','fara.jpg'];return `<div class="artifact ${unlocked?'':'locked'}" style="background-image:url('${imgs[i]}');background-size:cover;background-position:center"><div class="artifact-copy"><small>${unlocked?f.year:'Archivio bloccato'}</small><h3>${unlocked?esc(f.title):'Completa la missione'}</h3><p>${unlocked?esc(f.text):'Il documento verrà rivelato durante il percorso.'}</p></div></div>`}).join('')}</div></div>`}
function renderRecipes(){const pasta=['Spaghetti','Penne rigate','Fusilli','Paccheri'],sauce=['Cacio e pepe','Pomodoro','Pesto','Ragù'],territory=['Roma','Abruzzo','Liguria','Emilia'];const sel=state.selectedRecipe;let score=0,msg='Scegli formato, condimento e territorio per costruire una proposta.';if(sel.pasta&&sel.sauce&&sel.territory){const combos={"Spaghetti|Cacio e pepe|Roma":98,"Penne rigate|Pomodoro|Abruzzo":88,"Fusilli|Pesto|Liguria":96,"Paccheri|Ragù|Emilia":82};score=combos[`${sel.pasta}|${sel.sauce}|${sel.territory}`]||68;msg=score>90?'Abbinamento molto coerente: forma, condimento e geografia raccontano la stessa esperienza.':score>80?'Abbinamento credibile, con una buona leggibilità territoriale.':'La combinazione è possibile, ma la narrazione territoriale è debole.'}return `<div class="atlas"><div class="atlas-head"><div><div class="panel-label">Recipe geography</div><h2>Atlante delle occasioni</h2></div><p>Una sezione esplorativa che collega forma, condimento e territorio. Non assegna una verità assoluta: rende visibile la coerenza culturale della proposta.</p></div><div class="recipe-lab"><div class="recipe-visual"><div><div class="kicker">Food culture</div><h2>La pasta come geografia</h2><p>Formato, sugo e luogo producono un racconto diverso.</p></div></div><div class="recipe-controls"><div class="data-card"><h3>1. Formato</h3><div class="select-grid">${pasta.map(x=>`<button class="select-card ${sel.pasta===x?'active':''}" data-recipe="pasta" data-value="${x}"><b>${x}</b><span>Struttura e presa del condimento</span></button>`).join('')}</div></div><div class="data-card"><h3>2. Condimento</h3><div class="select-grid">${sauce.map(x=>`<button class="select-card ${sel.sauce===x?'active':''}" data-recipe="sauce" data-value="${x}"><b>${x}</b><span>Texture e intensità</span></button>`).join('')}</div></div><div class="data-card"><h3>3. Territorio</h3><div class="select-grid">${territory.map(x=>`<button class="select-card ${sel.territory===x?'active':''}" data-recipe="territory" data-value="${x}"><b>${x}</b><span>Contesto culturale</span></button>`).join('')}</div></div><div class="pairing-score"><strong>${score||'—'}</strong><span>/100</span><p>${msg}</p></div></div></div></div>`}
function bindDynamic(){document.querySelectorAll('[data-slider]').forEach(el=>el.addEventListener('input',e=>{const k=e.target.dataset.slider;const map={purezza:'purity',umidita:'humidity',granulometria:'grind',temp:'temp',time:'time',air:'air'};state.missionState[map[k]]=Number(e.target.value);renderShell()}));document.querySelectorAll('[data-atlas]').forEach(b=>b.onclick=()=>{const d={Maiella:['Maiella · clima','La montagna crea vincoli climatici ma anche una forte identità geografica.'],Sorgenti:['Sorgenti · acqua','La relazione tra risorsa idrica, impasto e reputazione territoriale rende l’acqua un nodo strategico.'],Mulino:['Mulino · semola','Il mulino accanto al pastificio consente continuità tra selezione del grano e trasformazione.'],Pastificio:['Pastificio · trasformazione','Capacità industriale e memoria locale convivono nello stesso paesaggio produttivo.']}[b.dataset.atlas];document.getElementById('atlasTitle').textContent=d[0];document.getElementById('atlasText').textContent=d[1]});document.querySelectorAll('[data-recipe]').forEach(b=>b.onclick=()=>{state.selectedRecipe[b.dataset.recipe]=b.dataset.value;renderShell()})}
function completeMission(msg){if(!state.done.includes(state.mission)){state.done.push(state.mission);state.unlocked.push(MISSIONS[state.mission].fact);for(const[k,v]of Object.entries(MISSIONS[state.mission].kpi||{}))state.kpi[k]=Math.min(100,(state.kpi[k]||0)+v);save();showToast(msg||'Missione completata')}renderShell()}
function handleAction(a,el){const s=state.missionState,m=MISSIONS[state.mission];if(a==='start'){state.started=true;renderShell();return}if(a==='credits'){showModal('Crediti e fonti',`<div class="credit-list"><b>Fonti storiche e di metodo</b><br>De Cecco, sezione Storia; De Cecco, Our Method; De Cecco, Recipes #AllaDeCecco.<br><br><b>Immagini Wikimedia Commons</b><br>Fara San Martino (cropped) — Zitumassin/Teseo, CC BY 3.0.<br>Pastificio De Cecco, Fara San Martino — Zitumassin, CC BY 3.0.<br>Triticum durum sl3 — Stefan.lefnaer, CC BY-SA 4.0.<br>Spaghetti cacio e pepe — Der Zahir, CC BY-SA 4.0.<br>Early Industrial Pasta Machines P002 — DEMACO, CC BY-SA 4.0.<br><br>Le immagini sono impiegate come reference visuals in un concept non ufficiale.</div>`);return}if(a==='toggle-panel'){state.missionPanel=!state.missionPanel;renderShell();return}if(a==='reset-mission'){resetMissionState();state.done=state.done.filter(x=>x!==state.mission);renderShell();return}if(a==='next'){if(!state.done.includes(state.mission))return;if(state.mission<MISSIONS.length-1){state.mission++;resetMissionState();state.view='mission';renderShell()}else showFinal();return}
if(a==='explore'){s['n'+el.dataset.i]=true;if([0,1,2,3].every(i=>s['n'+i]))completeMission('Geografia delle origini ricostruita');else renderShell();return}
if(a==='validate-mill'){let score=Math.round(100-Math.abs((s.purity??72)-84)*1.2-Math.abs((s.humidity??48)-42)*1.1-Math.abs((s.grind??55)-61)*.9);score>=78&&score<=92?completeMission('Lotto di farina validato'):showToast('La curva non è ancora stabile');return}
if(a==='alloc'){s.alloc=s.alloc||{mill:34,lab:33,people:33};const k=el.dataset.key,d=Number(el.dataset.delta);const total=Object.values(s.alloc).reduce((x,y)=>x+y,0);if(d>0&&total>=100)return;if(d<0&&s.alloc[k]<=0)return;s.alloc[k]+=d;renderShell();return}
if(a==='validate-allocation'){const x=s.alloc||{mill:34,lab:33,people:33},total=x.mill+x.lab+x.people;Math.min(x.mill,x.lab,x.people)>=30&&total===100?completeMission('Pastificio fondato nel 1886'):showToast('Serve equilibrio e un totale esatto di 100');return}
if(a==='validate-drying'){let temp=s.temp??(m.type==='drying'?52:48),time=s.time??(m.type==='drying'?70:82),air=s.air??55;let q=Math.round(100-Math.abs(temp-48)*1.2-Math.abs(time-82)*.45-Math.abs(air-56)*.55),c=Math.round(temp*.55+air*.38+(100-time)*.12);(q>=82&&temp<=60&&(m.type!=='method'||(q>=85&&c<70)))?completeMission('Curva di essiccazione approvata'):showToast('Rivedi tempo, temperatura e flusso');return}
if(a==='choice'){s.choice=Number(el.dataset.i);renderShell();return}if(a==='validate-choice'){s.choice===1?completeMission('Vincolo climatico trasformato in innovazione'):showToast('La strategia non garantisce continuità e qualità');return}
if(a==='brand'){const i=Number(el.dataset.i);s['b'+i]=!s['b'+i];renderShell();return}if(a==='validate-brand'){const chosen=[0,1,2,3,4,5].filter(i=>s['b'+i]);chosen.length===3&&[0,1,2].every(i=>chosen.includes(i))?completeMission('Identità del 1908 composta'):showToast('Servono territorio, materia prima e riconoscibilità');return}
if(a==='salvage'){const i=Number(el.dataset.i);s['z'+i]=!s['z'+i];renderShell();return}if(a==='validate-salvage'){const good=[0,1,2,3].filter(i=>s['z'+i]).length,bad=[4,5].filter(i=>s['z'+i]).length;good>=4&&bad===0?completeMission('Piano di recupero completato'):showToast('Recupera le risorse utili senza assorbire i danni irreversibili');return}
if(a==='part'){s.order=s.order||[];const i=Number(el.dataset.i);if(!s.order.includes(i))s.order.push(i);renderShell();return}if(a==='validate-assembly'){JSON.stringify(s.order||[])===JSON.stringify([0,1,2,3])?completeMission('Linea minima riavviata nel 1944'):(s.order=[],showToast('La sequenza deve seguire impasto, lavorazione, formatura, essiccazione'),renderShell());return}
if(a==='portfolio'){const i=Number(el.dataset.i);s['p'+i]=!s['p'+i];renderShell();return}if(a==='validate-portfolio'){const chosen=[0,1,2,3,4,5].filter(i=>s['p'+i]);const vals=[34,24,26,23,-20,-8];const score=chosen.reduce((a,i)=>a+vals[i],0);chosen.length===3&&score>=80?completeMission('Portafoglio coerente approvato'):showToast('Scegli tre categorie e supera 80 di coerenza');return}
if(a==='market'){s.markets=s.markets||[];const i=Number(el.dataset.i);if(!s.markets.includes(i))s.markets.push(i);renderShell();return}if(a==='validate-world'){(s.markets||[]).length===3?completeMission('Rotte globali attivate'):showToast('Apri tutti e tre i mercati');return}
if(a==='timeline'){s.timeline=s.timeline||[];const i=Number(el.dataset.i);if(!s.timeline.includes(i))s.timeline.push(i);renderShell();return}if(a==='validate-timeline'){(s.timeline||[]).length===4?completeMission('Percorso di memoria aperto'):showToast('Attiva tutti i pannelli');return}}
function showModal(title,html){document.body.insertAdjacentHTML('beforeend',`<div class="modal"><div class="modal-card"><h2>${title}</h2>${html}<div class="modal-actions"><button class="primary" onclick="this.closest('.modal').remove()">Chiudi</button></div></div></div>`)}
function showFinal(){const avg=Math.round(Object.values(state.kpi).reduce((a,b)=>a+b,0)/5);showModal('Il metodo è nelle tue mani',`<p>Hai completato tutte le missioni e trasformato dodici informazioni storiche in un percorso di gestione, esplorazione, ricostruzione e cultura alimentare.</p><div class="mission-stats" style="color:#fff"><div class="stat"><small>Missioni</small><b>12/12</b></div><div class="stat"><small>Indice finale</small><b class="yellow">${avg}</b></div></div><p><b>Profilo:</b> ${avg>=85?'Custode del Metodo':avg>=70?'Mastro della Filiera':'Apprendista del Territorio'}.</p><div class="modal-actions"><button class="secondary" onclick="location.reload()">Ricomincia</button><button class="primary" onclick="this.closest('.modal').remove()">Esplora liberamente</button></div>`)}
app.addEventListener('click',e=>{const v=e.target.closest('[data-view]');if(v){state.view=v.dataset.view;state.missionPanel=false;renderShell();return}const b=e.target.closest('[data-action]');if(b)handleAction(b.dataset.action,b)});
try{const saved=JSON.parse(localStorage.getItem('dececcoLegacyGame'));if(saved&&saved.started)Object.assign(state,saved)}catch(e){}
state.started?renderShell():renderIntro();
</script>
