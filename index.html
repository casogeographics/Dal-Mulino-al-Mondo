<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dal Mulino al Mondo — Il grande gioco della storia De Cecco" />
  <title>Dal Mulino al Mondo | Gioco della storia De Cecco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blu: #00529b;
      --blu-scuro: #003a70;
      --giallo: #f5b91e;
      --crema: #fbf4e4;
      --rosso: #c8102e;
      --testo: #4a4336;
      --testo-soft: #5a5142;
      --muted: #9a9183;
      --verde-bg: #e8f5e0;
      --verde-border: #4c9a3d;
      --verde-text: #2c5e22;
      --rosso-bg: #fbe7e7;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(160deg, var(--blu) 0%, var(--blu-scuro) 100%);
      font-family: "Archivo", Arial, sans-serif;
    }

    button { font-family: inherit; }

    button:focus-visible {
      outline: 3px solid var(--giallo);
      outline-offset: 3px;
    }

    .app {
      width: 100%;
      max-width: 576px;
    }

    .card {
      width: 100%;
      border-radius: 16px;
      background: var(--crema);
      box-shadow: 0 24px 60px rgba(0, 0, 0, .35);
    }

    .intro-card,
    .final-card {
      padding: 48px 32px;
      text-align: center;
    }

    .question-card {
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .3);
    }

    .anim {
      animation: salita .45s ease both;
    }

    @keyframes salita {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .anim { animation: none; }
    }

    .eyebrow {
      margin-bottom: 12px;
      color: var(--rosso);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .eyebrow.compact { margin-bottom: 8px; }

    h1, h2 { margin: 0; }

    h1 {
      margin-bottom: 8px;
      color: var(--blu-scuro);
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2.35rem, 9vw, 2.6rem);
      font-weight: 900;
      line-height: 1.05;
    }

    h2 {
      margin-bottom: 20px;
      color: var(--blu-scuro);
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.35;
    }

    p { margin: 0; }

    .subtitle {
      margin-bottom: 4px;
      color: var(--blu);
      font-weight: 600;
    }

    .description,
    .final-message {
      max-width: 448px;
      margin: 0 auto 32px;
      color: var(--testo-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .eras-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 0 0 32px;
    }

    .era-box {
      padding: 8px 12px;
      border: 1px solid rgba(0, 82, 155, .2);
      border-radius: 8px;
      background: rgba(0, 82, 155, .08);
      text-align: left;
    }

    .era-name {
      color: var(--blu-scuro);
      font-size: 12px;
      font-weight: 700;
    }

    .era-years {
      color: var(--blu);
      font-size: 12px;
    }

    .primary-button,
    .secondary-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .primary-button {
      padding: 16px 40px;
      background: var(--giallo);
      box-shadow: 0 8px 20px rgba(245, 185, 30, .4);
      color: var(--blu-scuro);
      font-size: 18px;
    }

    .secondary-button {
      padding: 10px 24px;
      background: var(--blu);
      color: #fff;
      font-size: 14px;
    }

    .replay-button {
      padding: 16px 40px;
      background: var(--blu);
      box-shadow: 0 8px 20px rgba(0, 58, 112, .4);
      color: #fff;
      font-size: 18px;
    }

    .primary-button:hover,
    .secondary-button:hover,
    .replay-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .game-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .current-era {
      color: var(--giallo);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .current-years {
      color: rgba(255, 255, 255, .7);
      font-size: 12px;
    }

    .score {
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .score span {
      opacity: .7;
      font-weight: 400;
    }

    .progress {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .grain-dot {
      display: inline-block;
      width: 12px;
      height: 18px;
      border: 2px solid transparent;
      border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
      background: rgba(255, 255, 255, .35);
      transition: all .3s ease;
    }

    .grain-dot.ok { background: var(--giallo); }
    .grain-dot.ko { background: rgba(255, 255, 255, .18); }
    .grain-dot.now { border-color: var(--giallo); }

    .question-count {
      margin-bottom: 8px;
      color: var(--rosso);
      font-size: 12px;
      font-weight: 700;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .answer-button {
      appearance: none;
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(0, 82, 155, .25);
      border-radius: 12px;
      background: #fff;
      color: var(--blu-scuro);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      text-align: left;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .answer-button:not(:disabled):hover {
      border-color: var(--blu);
      transform: translateY(-1px);
    }

    .answer-button:disabled { cursor: default; }

    .answer-button.correct {
      border-color: var(--verde-border);
      background: var(--verde-bg);
      color: var(--verde-text);
    }

    .answer-button.wrong {
      border-color: var(--rosso);
      background: var(--rosso-bg);
      color: var(--rosso);
    }

    .answer-button.muted { color: var(--muted); }

    .fact-box {
      margin-top: 20px;
      padding: 16px;
      border-left: 4px solid var(--giallo);
      border-radius: 12px;
      background: rgba(0, 82, 155, .07);
    }

    .fact-title {
      margin-bottom: 4px;
      color: var(--blu);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .fact-text {
      color: var(--testo);
      font-size: 14px;
      line-height: 1.55;
    }

    .fact-box .secondary-button { margin-top: 16px; }

    .final-score {
      margin-bottom: 16px;
      color: var(--blu-scuro);
      font-family: "Fraunces", Georgia, serif;
      font-size: 3.4rem;
      font-weight: 900;
      line-height: 1;
    }

    .final-score span {
      color: var(--blu);
      font-size: 1.5rem;
    }

    .rank {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 20px;
      border-radius: 999px;
      background: var(--giallo);
      color: var(--blu-scuro);
      font-weight: 700;
    }

    .final-progress {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-bottom: 32px;
    }

    .footer-note {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 420px) {
      body { padding: 12px; }
      .intro-card, .final-card { padding: 38px 20px; }
      .question-card { padding: 22px 18px; }
      .eras-grid { gap: 8px; }
      .era-box { padding: 7px 9px; }
      .primary-button, .replay-button { width: 100%; padding-inline: 20px; }
    }
  </style>
</head>
<body>
  <main id="app" class="app" aria-live="polite"></main>

  <script>
    "use strict";

    const ERE = [
      { id: 0, nome: "Le Origini", anni: "1831–1886" },
      { id: 1, nome: "L'Innovazione", anni: "1889–1908" },
      { id: 2, nome: "La Rinascita", anni: "1943–1950" },
      { id: 3, nome: "Il Mondo", anni: "Oggi" }
    ];

    const DOMANDE = [
      {
        era: 0,
        q: "Dove nasce la storia della famiglia De Cecco?",
        opzioni: ["Fara San Martino, alle falde della Maiella", "Gragnano, in Campania", "Parma, in Emilia", "Bari, in Puglia"],
        corretta: 0,
        sapevi: "Tutto inizia in un piccolo borgo abruzzese in provincia di Chieti, ai piedi della Maiella, dove l'acqua pura di montagna è ancora oggi un ingrediente della nostra pasta."
      },
      {
        era: 0,
        q: "Cosa produceva don Nicola De Cecco nel suo mulino in pietra, già nel 1831?",
        opzioni: ["Olio d'oliva", "“La miglior farina del contado”", "Pane per il paese", "Conserve di pomodoro"],
        corretta: 1,
        sapevi: "La fama delle farine di don Nicola era tale da essere ricordata con questa espressione. La passione per la qualità è nel DNA della famiglia da quasi due secoli."
      },
      {
        era: 0,
        q: "In che anno Filippo Giovanni De Cecco fonda il pastificio?",
        opzioni: ["1861", "1886", "1901", "1920"],
        corretta: 1,
        sapevi: "Nel 1886 Filippo, ereditata la passione del padre mugnaio, amplia l'attività alla produzione di pasta: nasce il Pastificio De Cecco."
      },
      {
        era: 1,
        q: "Quale invenzione rivoluzionaria mette a punto Filippo De Cecco nel 1889?",
        opzioni: ["La trafila in bronzo", "Il primo impianto di essiccazione artificiale ad aria calda", "Il confezionamento sottovuoto", "Il mulino a vapore"],
        corretta: 1,
        sapevi: "Prima di allora la pasta si essiccava al sole. L'invenzione di Filippo liberò la produzione dai capricci del clima: una svolta epocale per tutta l'industria della pasta."
      },
      {
        era: 1,
        q: "Perché a Fara San Martino l'essiccazione al sole era un problema?",
        opzioni: ["Il paese è ai piedi della montagna, con un clima poco adatto", "C'era troppo vento", "Mancava lo spazio nelle piazze", "Era vietata dal comune"],
        corretta: 0,
        sapevi: "A differenza dei pastifici del sud, Fara San Martino non poteva contare sull'essiccazione naturale: da questa sfida nacque l'ingegno che rese unica De Cecco."
      },
      {
        era: 1,
        q: "Quale figura diventa il marchio De Cecco nel 1908?",
        opzioni: ["Un mulino ad acqua", "La contadina con i covoni di grano", "Un mastro pastaio coi baffi", "La montagna della Maiella"],
        corretta: 1,
        sapevi: "La contadina abruzzese che porta due covoni di grano accompagna le nostre confezioni da oltre un secolo: un simbolo di genuinità riconosciuto in tutto il mondo."
      },
      {
        era: 2,
        q: "Cosa accadde allo stabilimento di Fara San Martino durante la Seconda guerra mondiale?",
        opzioni: ["Fu venduto a un'azienda straniera", "Continuò a produrre senza sosta", "Fu occupato e depredato dai tedeschi in ritirata", "Fu trasformato in ospedale"],
        corretta: 2,
        sapevi: "Macchinari, attrezzi e scorte furono portati via. Fu uno dei momenti più duri della nostra storia."
      },
      {
        era: 2,
        q: "Come ripartì la produzione nel 1944?",
        opzioni: ["Con macchinari nuovi importati dall'America", "Con una piccola macchina costruita da pezzi di recupero", "Affittando un altro stabilimento", "Producendo solo farina per dieci anni"],
        corretta: 1,
        sapevi: "La famiglia De Cecco ricostruì tutto partendo da pezzi di recupero. Negli anni '50 l'azienda conobbe una rapida crescita: la tenacia è uno dei nostri valori fondanti."
      },
      {
        era: 3,
        q: "Cosa rende speciale ancora oggi l'essiccazione De Cecco?",
        opzioni: ["È rapidissima, ad altissime temperature", "È lenta e a bassa temperatura, come al sole", "Avviene all'aperto, in piazza", "Usa il vapore del mulino"],
        corretta: 1,
        sapevi: "Fedeli al metodo del fondatore, essicchiamo lentamente a bassa temperatura: per gli spaghetti possono servire molte ore, ma è così che si preservano gusto e proteine del grano."
      },
      {
        era: 3,
        q: "Oltre alla pasta, quali prodotti firma oggi De Cecco?",
        opzioni: ["Solo pasta, da sempre", "Olio extravergine, derivati del pomodoro, sughi e prodotti da forno", "Formaggi e salumi", "Caffè e dolciumi"],
        corretta: 1,
        sapevi: "La diversificazione iniziò già a inizio Novecento con la Società Olearia. Oggi i sughi pronti portano anche la firma dello chef tre stelle Michelin Heinz Beck."
      },
      {
        era: 3,
        q: "Fin dove è arrivata la pasta De Cecco nel mondo?",
        opzioni: ["Solo in Europa", "In Europa e Nord Africa", "In Europa, nelle Americhe e fino al Giappone", "Resta un prodotto solo italiano"],
        corretta: 2,
        sapevi: "De Cecco è oggi tra i maggiori produttori di pasta al mondo e ambasciatrice della cultura alimentare italiana su ogni continente."
      },
      {
        era: 3,
        q: "Quale riconoscimento ha ricevuto il marchio De Cecco dal Ministero dello Sviluppo Economico?",
        opzioni: ["Premio per il design della confezione", "Iscrizione nel registro dei marchi storici di interesse nazionale", "Medaglia al valore industriale", "Certificazione del mulino più antico d'Italia"],
        corretta: 1,
        sapevi: "Un riconoscimento che celebra oltre un secolo di storia, qualità e regole tramandate di padre in figlio, dal 1886 a oggi."
      }
    ];

    const GRADI = [
      { min: 0, titolo: "Apprendista Mugnaio", msg: "C'è ancora grano da macinare! Ripercorri la nostra storia e riprova." },
      { min: 5, titolo: "Garzone di Bottega", msg: "Buona base! Qualche capitolo della storia merita una seconda lettura." },
      { min: 8, titolo: "Mastro Pastaio", msg: "Ottimo lavoro: conosci a fondo la tradizione De Cecco." },
      { min: 11, titolo: "Custode della Tradizione", msg: "Perfetto come una trafilatura al bronzo. La storia De Cecco non ha segreti per te!" }
    ];

    const stato = {
      schermo: "intro",
      idx: 0,
      punti: 0,
      scelta: null,
      esiti: []
    };

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function grainDot(classe) {
      return `<span class="grain-dot ${classe}" aria-hidden="true"></span>`;
    }

    function renderIntro() {
      const ere = ERE.map((e) => `
        <div class="era-box">
          <div class="era-name">${escapeHtml(e.nome)}</div>
          <div class="era-years">${escapeHtml(e.anni)}</div>
        </div>`).join("");

      app.innerHTML = `
        <section class="card intro-card anim" aria-labelledby="titolo-gioco">
          <div class="eyebrow">Dal 1886 · Fara San Martino</div>
          <h1 id="titolo-gioco">Dal Mulino<br />al Mondo</h1>
          <p class="subtitle">Il grande gioco della storia De Cecco</p>
          <p class="description">
            Un viaggio in quattro epoche, dalle falde della Maiella alle tavole di tutto il mondo.
            12 domande, una sola regola: la qualità non si improvvisa.
          </p>
          <div class="eras-grid">${ere}</div>
          <button class="primary-button" type="button" data-action="start">Inizia il viaggio</button>
        </section>`;
    }

    function renderGame() {
      const domanda = DOMANDE[stato.idx];
      const era = ERE[domanda.era];
      const risposto = stato.scelta !== null;

      const avanzamento = DOMANDE.map((_, i) => {
        let classe = "future";
        if (i < stato.esiti.length) classe = stato.esiti[i] ? "ok" : "ko";
        else if (i === stato.idx) classe = "now";
        return grainDot(classe);
      }).join("");

      const opzioni = domanda.opzioni.map((opzione, i) => {
        const classi = ["answer-button"];
        if (risposto && i === domanda.corretta) classi.push("correct");
        else if (risposto && i === stato.scelta) classi.push("wrong");
        else if (risposto) classi.push("muted");

        return `
          <button
            class="${classi.join(" ")}"
            type="button"
            data-action="answer"
            data-index="${i}"
            ${risposto ? "disabled" : ""}
          >${escapeHtml(opzione)}</button>`;
      }).join("");

      const approfondimento = risposto ? `
        <div class="fact-box anim">
          <div class="fact-title">${stato.scelta === domanda.corretta ? "Esatto! Lo sapevi che…" : "Lo sapevi che…"}</div>
          <p class="fact-text">${escapeHtml(domanda.sapevi)}</p>
          <button class="secondary-button" type="button" data-action="next">
            ${stato.idx + 1 < DOMANDE.length ? "Avanti →" : "Vedi il risultato"}
          </button>
        </div>` : "";

      app.innerHTML = `
        <section aria-labelledby="domanda-corrente">
          <div class="game-topbar">
            <div>
              <div class="current-era">${escapeHtml(era.nome)}</div>
              <div class="current-years">${escapeHtml(era.anni)}</div>
            </div>
            <div class="score">${stato.punti} <span>punti</span></div>
          </div>
          <div class="progress" aria-label="Avanzamento: domanda ${stato.idx + 1} di ${DOMANDE.length}">${avanzamento}</div>
          <div class="card question-card anim">
            <div class="question-count">Domanda ${stato.idx + 1} di ${DOMANDE.length}</div>
            <h2 id="domanda-corrente">${escapeHtml(domanda.q)}</h2>
            <div class="answers">${opzioni}</div>
            ${approfondimento}
          </div>
        </section>`;
    }

    function getGrado() {
      return [...GRADI].reverse().find((grado) => stato.punti >= grado.min) || GRADI[0];
    }

    function renderFinal() {
      const grado = getGrado();
      const esiti = stato.esiti.map((ok) => grainDot(ok ? "ok" : "ko")).join("");

      app.innerHTML = `
        <section class="card final-card anim" aria-labelledby="titolo-finale">
          <div class="eyebrow compact">Viaggio completato</div>
          <div class="final-score" id="titolo-finale">${stato.punti}<span>/${DOMANDE.length}</span></div>
          <div class="rank">${escapeHtml(grado.titolo)}</div>
          <p class="final-message">${escapeHtml(grado.msg)}</p>
          <div class="final-progress" aria-label="Risultati delle risposte">${esiti}</div>
          <button class="secondary-button replay-button" type="button" data-action="restart">Gioca di nuovo</button>
          <p class="footer-note">Dal 1886 · F.lli De Cecco di Filippo · Fara San Martino</p>
        </section>`;
    }

    function render() {
      if (stato.schermo === "intro") renderIntro();
      else if (stato.schermo === "gioco") renderGame();
      else renderFinal();
    }

    function startGame() {
      stato.schermo = "gioco";
      render();
    }

    function answer(index) {
      if (stato.scelta !== null) return;
      const domanda = DOMANDE[stato.idx];
      const corretta = index === domanda.corretta;
      stato.scelta = index;
      if (corretta) stato.punti += 1;
      stato.esiti.push(corretta);
      render();
    }

    function nextQuestion() {
      stato.scelta = null;
      if (stato.idx + 1 < DOMANDE.length) stato.idx += 1;
      else stato.schermo = "fine";
      render();
    }

    function restart() {
      stato.schermo = "intro";
      stato.idx = 0;
      stato.punti = 0;
      stato.scelta = null;
      stato.esiti = [];
      render();
    }

    app.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const action = button.dataset.action;
      if (action === "start") startGame();
      else if (action === "answer") answer(Number(button.dataset.index));
      else if (action === "next") nextQuestion();
      else if (action === "restart") restart();
    });

    render();
  </script>
</body>
</html>
